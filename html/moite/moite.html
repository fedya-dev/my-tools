<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Моят Хубав Навигатор</title>
    <style>
        /* === УНИКАЛНИ CSS СТИЛОВЕ — започват с ns- (namespace) за нулев конфликт === */
        :root {
            --ns-gradient-1: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            --ns-gradient-2: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            --ns-gradient-3: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            --ns-glow: 0 0 20px rgba(255, 255, 255, 0.6);
            --ns-font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --ns-radius: 18px;
            --ns-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .ns-body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: var(--ns-gradient-1);
            font-family: var(--ns-font-main);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .ns-body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><defs><radialGradient id="g"><stop offset="0%" stop-color="%23ffffff" stop-opacity="0.1"/><stop offset="100%" stop-color="%23ffffff" stop-opacity="0"/></radialGradient></defs><circle cx="20" cy="20" r="40" fill="url(%23g)"/><circle cx="80" cy="80" r="30" fill="url(%23g)"/></svg>') repeat;
            animation: ns-float 20s infinite linear;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes ns-float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, -100px); }
        }

        .ns-container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--ns-radius);
            padding: 3rem 2.5rem;
            width: 90%;
            max-width: 420px;
            box-shadow: var(--ns-shadow), var(--ns-glow);
            text-align: center;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: ns-fadeIn 1.2s ease-out;
        }

        @keyframes ns-fadeIn {
            0% { opacity: 0; transform: translateY(-30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .ns-title {
            font-size: 2.1rem;
            font-weight: 700;
            background: var(--ns-gradient-2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 1.8rem;
            letter-spacing: -0.5px;
        }

        .ns-subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 2.2rem;
            font-weight: 500;
        }

        .ns-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.1rem;
        }

        .ns-card {
            background: rgba(255, 255, 255, 0.15);
            border-radius: var(--ns-radius);
            padding: 1.3rem 1rem;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .ns-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.6s;
        }

        .ns-card:hover::before {
            left: 100%;
        }

        .ns-card:hover {
            transform: translateY(-6px) scale(1.03);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15), var(--ns-glow);
            background: rgba(255, 255, 255, 0.3);
        }

        .ns-card-icon {
            font-size: 1.8rem;
            margin-bottom: 0.6rem;
            display: block;
        }

        .ns-card-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: #ffffff;
            margin: 0 0 0.3rem;
        }

        .ns-card-desc {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.85);
            margin: 0;
        }

        .ns-footer {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .ns-footer a {
            color: inherit;
            text-decoration: underline dotted;
        }

        /* Адаптивност */
        @media (min-width: 480px) {
            .ns-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .ns-container {
                padding: 3.5rem 3rem;
            }
        }

        @media (prefers-color-scheme: dark) {
            .ns-body {
                --ns-gradient-1: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            }
        }
    </style>
</head>
<body class="ns-body">

    <div class="ns-container">
        <h1 class="ns-title">🌿 Избери страница</h1>
        <p class="ns-subtitle">Бърз достъп до любимите ти HTML файлове</p>

        <div class="ns-grid">
            <!-- === РЕДАКТИРАЙ ТУК — добавяй/премахвай карти === -->
            <div class="ns-card" onclick="window.location.href='url-decoder-htaccess.html'">
                <span class="ns-card-icon">📝</span>
                <h3 class="ns-card-title">url-decoder</h3>
                <p class="ns-card-desc">url-decoder-htaccess</p>
            </div>

            <div class="ns-card" onclick="window.location.href='todo.html'">
                <span class="ns-card-icon">✅</span>
                <h3 class="ns-card-title">Задачи</h3>
                <p class="ns-card-desc">To-Do списък за деня</p>
            </div>

            <div class="ns-card" onclick="window.location.href='calendar.html'">
                <span class="ns-card-icon">📅</span>
                <h3 class="ns-card-title">Календар</h3>
                <p class="ns-card-desc">Събития и срещи</p>
            </div>

            <div class="ns-card" onclick="window.location.href='bookmarks.html'">
                <span class="ns-card-icon">🔖</span>
                <h3 class="ns-card-title">Любими</h3>
                <p class="ns-card-desc">Бързи линкове</p>
            </div>
            <!-- === КРАЙ НА РЕДАКТИРАНЕ === -->
        </div>

        <div class="ns-footer">
            Създадено с ❤️ | <a href="#" onclick="alert('Добави още карти в кода!')">Как да добавя?</a>
        </div>
    </div>

    <script>
        // Лека анимация при зареждане
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.ns-card').forEach((card, i) => {
                card.style.animationDelay = `${i * 0.15}s`;
                card.style.animation = 'ns-fadeIn 0.6s ease-out forwards';
                card.style.opacity = '0';
            });
        });
    </script>
</body>
</html>
