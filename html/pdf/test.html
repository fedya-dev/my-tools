<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Редактор PRO</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Тук е същия CSS стил */
    </style>
</head>
<body>
    <!-- HTML структурата остава същата -->
    
    <script>
        // ПЪРВО: Тестова функция за проверка на библиотеките
        function checkLibraries() {
            console.log('Проверка на библиотеките...');
            
            if (typeof PDFLib === 'undefined') {
                console.error('PDFLib не е зареден!');
                return false;
            }
            
            if (typeof pdfjsLib === 'undefined') {
                console.error('PDF.js не е зареден!');
                return false;
            }
            
            console.log('Всички библиотеки са заредени успешно!');
            return true;
        }

        // ВТОРО: По-опростена и стабилна версия на кода
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Документът е зареден');
            
            if (!checkLibraries()) {
                alert('Грешка при зареждане на библиотеките. Моля, презаредете страницата или използвайте интернет връзка.');
                return;
            }
            
            // Основни променливи
            let currentLang = 'bg';
            let selectedTool = null;
            let uploadedFiles = [];
            
            // Настройка на темата
            const themeToggle = document.getElementById('themeToggle');
            themeToggle.addEventListener('click', function() {
                const html = document.documentElement;
                if (html.getAttribute('data-theme') === 'light') {
                    html.removeAttribute('data-theme');
                    themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                } else {
                    html.setAttribute('data-theme', 'light');
                    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                }
            });
            
            // Език
            document.getElementById('langSelect').addEventListener('change', function(e) {
                currentLang = e.target.value;
                updateLanguage();
            });
            
            // Инструменти
            document.querySelectorAll('.tool-card').forEach(card => {
                card.addEventListener('click', function() {
                    const tool = this.dataset.tool;
                    selectTool(tool);
                });
            });
            
            // Качване на файлове
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.classList.add('dragover');
            });
            
            uploadArea.addEventListener('dragleave', function(e) {
                e.preventDefault();
                this.classList.remove('dragover');
            });
            
            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('dragover');
                const files = e.dataTransfer.files;
                handleFiles(files);
            });
            
            fileInput.addEventListener('change', function(e) {
                handleFiles(e.target.files);
            });
            
            // Изчистване
            document.getElementById('clearBtn').addEventListener('click', clearAll);
            
            // Обработка
            document.getElementById('processBtn').addEventListener('click', processFiles);
            
            // Помощ
            document.getElementById('helpBtn').addEventListener('click', function() {
                alert('За помощ: 1. Изберете инструмент 2. Качете PDF файлове 3. Кликнете "Обработи"');
            });
            
            function selectTool(tool) {
                selectedTool = tool;
                
                // Премахване на активен клас от всички
                document.querySelectorAll('.tool-card').forEach(c => {
                    c.classList.remove('active');
                });
                
                // Добавяне на активен клас към избрания
                document.querySelector(`[data-tool="${tool}"]`).classList.add('active');
                
                // Показване на зоната за качване
                uploadArea.classList.add('active');
                
                // Скриване на файлове от предишна операция
                document.getElementById('fileList').innerHTML = '';
                document.getElementById('actionButtons').classList.remove('active');
                
                // Показване на подходящо съобщение
                let toolName = '';
                switch(tool) {
                    case 'merge': toolName = 'Обединяване'; break;
                    case 'split': toolName = 'Разделяне'; break;
                    case 'compress': toolName = 'Компресиране'; break;
                    case 'rotate': toolName = 'Завъртане'; break;
                    case 'extract': toolName = 'Извличане'; break;
                    case 'delete': toolName = 'Изтриване'; break;
                }
                
                console.log(`Избран инструмент: ${toolName}`);
            }
            
            function handleFiles(files) {
                if (!selectedTool) {
                    alert('Моля, първо изберете инструмент отгоре!');
                    return;
                }
                
                const validFiles = Array.from(files).filter(file => {
                    // Проверка за PDF
                    if (!file.type.includes('pdf') && !file.name.toLowerCase().endsWith('.pdf')) {
                        console.warn(`Файлът ${file.name} не е PDF и ще бъде пропуснат`);
                        return false;
                    }
                    
                    // Проверка за размер (50MB)
                    if (file.size > 50 * 1024 * 1024) {
                        alert(`Файлът ${file.name} е твърде голям (над 50MB)`);
                        return false;
                    }
                    
                    return true;
                });
                
                if (validFiles.length === 0) {
                    alert('Няма валидни PDF файлове за качване');
                    return;
                }
                
                uploadedFiles = uploadedFiles.concat(validFiles);
                updateFileList();
            }
            
            function updateFileList() {
                const fileList = document.getElementById('fileList');
                fileList.innerHTML = '';
                
                if (uploadedFiles.length === 0) {
                    fileList.classList.remove('active');
                    return;
                }
                
                fileList.classList.add('active');
                document.getElementById('actionButtons').classList.add('active');
                
                uploadedFiles.forEach((file, index) => {
                    const fileSize = (file.size / 1024 / 1024).toFixed(2);
                    const fileItem = document.createElement('div');
                    fileItem.className = 'file-item';
                    fileItem.innerHTML = `
                        <div class="file-info">
                            <div class="file-icon">
                                <i class="fas fa-file-pdf"></i>
                            </div>
                            <div class="file-details">
                                <div class="file-name">${file.name}</div>
                                <div class="file-meta">
                                    <span>${fileSize} MB</span>
                                </div>
                            </div>
                        </div>
                        <div class="file-actions">
                            <button class="btn-danger" onclick="removeFile(${index})">
                                <i class="fas fa-times"></i> Премахни
                            </button>
                        </div>
                    `;
                    fileList.appendChild(fileItem);
                });
            }
            
            // Функция за премахване на файл (трябва да е глобална за onclick)
            window.removeFile = function(index) {
                uploadedFiles.splice(index, 1);
                updateFileList();
            };
            
            function clearAll() {
                uploadedFiles = [];
                selectedTool = null;
                document.querySelectorAll('.tool-card').forEach(c => c.classList.remove('active'));
                uploadArea.classList.remove('active');
                document.getElementById('fileList').innerHTML = '';
                document.getElementById('actionButtons').classList.remove('active');
                document.getElementById('fileInput').value = '';
            }
            
            async function processFiles() {
                if (!selectedTool) {
                    alert('Моля, изберете инструмент!');
                    return;
                }
                
                if (uploadedFiles.length === 0) {
                    alert('Моля, качете файлове!');
                    return;
                }
                
                const processBtn = document.getElementById('processBtn');
                const status = document.getElementById('status');
                
                processBtn.disabled = true;
                status.style.display = 'block';
                status.className = 'status info';
                status.textContent = 'Обработка...';
                
                try {
                    let result;
                    
                    switch(selectedTool) {
                        case 'merge':
                            result = await mergePDFs(uploadedFiles);
                            break;
                        case 'split':
                            result = await splitPDF(uploadedFiles[0]);
                            break;
                        case 'compress':
                            result = await compressPDF(uploadedFiles[0]);
                            break;
                        case 'rotate':
                            result = await rotatePDF(uploadedFiles[0]);
                            break;
                        default:
                            throw new Error('Този инструмент все още се разработва');
                    }
                    
                    status.className = 'status success';
                    status.textContent = 'Успешно обработено! Изтегляне започва...';
                    
                    // Изтегляне на файла
                    downloadPDF(result, `pdf-${selectedTool}-${Date.now()}.pdf`);
                    
                } catch (error) {
                    console.error('Грешка:', error);
                    status.className = 'status error';
                    status.textContent = `Грешка: ${error.message}`;
                } finally {
                    processBtn.disabled = false;
                    setTimeout(() => {
                        status.style.display = 'none';
                    }, 5000);
                }
            }
            
            // PDF функции
            async function mergePDFs(files) {
                console.log('Обединяване на', files.length, 'файла');
                const { PDFDocument } = PDFLib;
                const mergedPdf = await PDFDocument.create();
                
                for (const file of files) {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await PDFDocument.load(arrayBuffer);
                    const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    pages.forEach(page => mergedPdf.addPage(page));
                }
                
                return await mergedPdf.save();
            }
            
            async function splitPDF(file) {
                console.log('Разделяне на файл:', file.name);
                const { PDFDocument } = PDFLib;
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await PDFDocument.load(arrayBuffer);
                
                // Разделяне по страници
                const pageCount = pdf.getPageCount();
                const resultPdf = await PDFDocument.create();
                
                // Копиране на първата страница за демонстрация
                if (pageCount > 0) {
                    const [firstPage] = await resultPdf.copyPages(pdf, [0]);
                    resultPdf.addPage(firstPage);
                }
                
                return await resultPdf.save();
            }
            
            async function compressPDF(file) {
                console.log('Компресиране на файл:', file.name);
                const { PDFDocument } = PDFLib;
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await PDFDocument.load(arrayBuffer);
                
                // Проста компресия - запазване с настройки по подразбиране
                return await pdf.save({
                    useObjectStreams: true
                });
            }
            
            async function rotatePDF(file) {
                console.log('Завъртане на файл:', file.name);
                const { PDFDocument, degrees } = PDFLib;
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await PDFDocument.load(arrayBuffer);
                
                // Завъртане на всички страници на 90 градуса
                const pages = pdf.getPages();
                pages.forEach(page => {
                    page.setRotation(degrees(90));
                });
                
                return await pdf.save();
            }
            
            function downloadPDF(pdfBytes, filename) {
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
            
            function updateLanguage() {
                // Проста реализация за смяна на езика
                const langTexts = {
                    bg: {
                        title: 'PDF Редактор PRO',
                        selectFiles: 'Избери файлове',
                        process: 'Обработи',
                        clearAll: 'Изчисти всичко'
                    },
                    en: {
                        title: 'PDF Editor PRO',
                        selectFiles: 'Select Files',
                        process: 'Process',
                        clearAll: 'Clear All'
                    }
                };
                
                const texts = langTexts[currentLang];
                document.querySelector('[data-lang="title"]').textContent = texts.title;
                document.querySelector('[data-lang="selectFiles"]').textContent = texts.selectFiles;
                document.querySelector('[data-lang="process"]').textContent = texts.process;
                document.querySelector('[data-lang="clearAll"]').textContent = texts.clearAll;
            }
            
            // Автоматично тестване при зареждане
            console.log('PDF Редактор PRO е зареден успешно!');
            
            // Показване на първите инструменти
            uploadArea.classList.add('active');
        });
    </script>
</body>
</html>
